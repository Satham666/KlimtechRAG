# KlimtechRAG — profil tryb ingest
# Użycie: KLIMTECH_PROFILES=ingest python3 -m backend_app.main
# Przeznaczenie: masowy ingest dokumentów (GPU embedding, bez LLM, mniej logów)

# --- LLM — wyłączony w trybie ingest ---
llm_base_url: "http://localhost:8082/v1"
llm_api_key: "sk-dummy"
llm_model_name: ""

# --- Embedding — GPU dla szybkości ---
embedding_model: "intfloat/multilingual-e5-large"
embedding_device: "cuda:0"

# --- Qdrant ---
qdrant_url: "http://localhost:6333"
qdrant_collection: "klimtech_docs"

# --- Batch / ingest ---
bm25_weight: 0.3
retrieval_top_k_fetch: 20

# --- Wyłącz funkcje niepotrzebne przy ingeście ---
contextual_enrichment: false
answer_verification: false
query_decomposition: false
reranker_enabled: false

# --- Logowanie — więcej szczegółów dla debugowania ingestu ---
log_level: "DEBUG"
log_json: false

# --- Limity ---
rate_limit_window_seconds: 60
rate_limit_max_requests: 600
max_file_size_bytes: 524288000
